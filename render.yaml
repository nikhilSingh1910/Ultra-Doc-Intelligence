databases:
  - name: ultra-doc-db
    plan: free
    databaseName: ultra_doc_intelligence
    user: ultra_doc_user

services:
  - type: web
    name: ultra-doc-intelligence-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ultra-doc-db
          property: connectionString
      - key: CHROMA_PERSIST_DIR
        value: /tmp/data/chroma
      - key: UPLOAD_DIR
        value: /tmp/data/uploads
      - key: PYTHON_VERSION
        value: "3.12.3"

  - type: web
    name: ultra-doc-intelligence-ui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ui/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: ultra-doc-intelligence-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: PYTHON_VERSION
        value: "3.12.3"
